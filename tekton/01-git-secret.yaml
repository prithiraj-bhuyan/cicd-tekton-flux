# Create this secret with your actual SSH private key (base64 encoded)
# kubectl apply -f 01-git-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: default
data:
  # Replace with: cat ~/.ssh/your_deploy_key | base64 -w0
  id_rsa: REPLACE_WITH_BASE64_ENCODED_PRIVATE_KEY
