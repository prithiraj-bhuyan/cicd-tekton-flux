apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: hello-ci-
  namespace: default
spec:
  pipelineRef:
    name: hello-ci
  podTemplate:
    securityContext:
      fsGroup: 65532
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: git-credentials
      secret:
        secretName: git-credentials
    - name: docker-credentials
      secret:
        secretName: docker-credentials
  params:
    - name: repo-url
      value: git@github.com:prithiraj-bhuyan/cicd-tekton-flux.git  # <-- CHANGE THIS
    - name: image-reference
      value: cloudnativeacr2.azurecr.io  # <-- CHANGE THIS
